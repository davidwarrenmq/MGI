# Medical Guideline Index — issuer registry (scope §4) + guideline trigger
# terms (scope §13.4). This file is the SINGLE SOURCE OF TRUTH: adding an issuer
# needs only an edit here, no code change (scope §5).

# Guideline-citation trigger terms. MGI recognises at least the same set the
# Citation Checker uses so the two systems agree on what counts as a guideline
# citation (scope §7 / §13.4).
triggers:
  - "guideline"
  - "guidelines"
  - "clinical practice guideline"
  - "practice guideline"
  - "position statement"
  - "consensus statement"
  - "consensus"
  - "technology appraisal"
  - "recommendation"
  - "recommendations"
  - "College of"
  - "Society of"
  - "Task Force"
  - "Therapeutic Guidelines"
  - "UpToDate"
  - "Cochrane"

